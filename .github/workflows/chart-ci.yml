name: Chart CI

on:
  pull_request:
    branches: [develop, master]
    paths:
      - "charts/**"
      - ".github/workflows/chart-ci.yml"

jobs:
  lint-and-template:
    name: Lint and template
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: helm lint (every chart)
        run: |
          set -e
          for chart in charts/*/; do
            echo "::group::helm lint $chart"
            helm lint "$chart"
            echo "::endgroup::"
          done

      - name: helm template (every chart, default values)
        run: |
          set -e
          for chart in charts/*/; do
            echo "::group::helm template $chart"
            helm template testrel "$chart"
            echo "::endgroup::"
          done

      - name: Set up Python (required by chart-testing)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: ct lint (charts changed in this PR)
        run: |
          ct lint \
            --target-branch ${{ github.event.pull_request.base.ref }} \
            --validate-maintainers=false \
            --chart-dirs charts
