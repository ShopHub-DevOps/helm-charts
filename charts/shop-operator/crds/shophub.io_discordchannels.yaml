---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: discordchannels.shophub.io
spec:
  group: shophub.io
  names:
    categories:
    - shophub
    kind: DiscordChannel
    listKind: DiscordChannelList
    plural: discordchannels
    shortNames:
    - dch
    singular: discordchannel
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.channelName
      name: Channel
      type: string
    - jsonPath: .spec.shopRef
      name: Shop
      type: string
    - jsonPath: .spec.minSeverity
      name: MinSeverity
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          DiscordChannel registers a Discord webhook destination for alerts emitted
          by the ShopHub platform.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DiscordChannelSpec is the user-supplied configuration for
              a DiscordChannel.
            properties:
              channelName:
                description: |-
                  ChannelName is the human-readable label for this channel, shown in the
                  ShopHub UI and used as the default username when posting to Discord.
                maxLength: 80
                minLength: 1
                type: string
              minSeverity:
                default: warning
                description: |-
                  MinSeverity filters which alerts are routed here. Alerts strictly below
                  this severity are dropped. Defaults to "warning".
                enum:
                - info
                - warning
                - critical
                type: string
              shopRef:
                description: |-
                  ShopRef optionally scopes alerts to a single Shop in the same namespace.
                  When empty, the channel receives alerts for every Shop in the namespace.
                type: string
              webhookSecretRef:
                description: WebhookSecretRef points at the Secret carrying the Discord
                  webhook URL.
                properties:
                  key:
                    default: url
                    description: |-
                      Key inside the Secret whose value is the webhook URL.
                      Defaults to "url" if unset.
                    type: string
                  name:
                    description: Name of the Secret in the same namespace as the DiscordChannel.
                    maxLength: 253
                    minLength: 1
                    type: string
                required:
                - name
                type: object
            required:
            - channelName
            - webhookSecretRef
            type: object
          status:
            description: DiscordChannelStatus is the reconciler-maintained observed
              state of a DiscordChannel.
            properties:
              conditions:
                description: Conditions follows the standard meta/v1 Condition pattern.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastValidatedAt:
                description: |-
                  LastValidatedAt records the time the referenced webhook Secret was last
                  verified to exist with the expected key.
                format: date-time
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration matches DiscordChannel.metadata.generation when the
                  status was last computed, so clients can detect stale statuses.
                format: int64
                type: integer
              phase:
                description: Phase is the high-level lifecycle position.
                enum:
                - Pending
                - Ready
                - Failed
                - Terminating
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
