---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: wallets.shophub.io
spec:
  group: shophub.io
  names:
    categories:
    - shophub
    kind: Wallet
    listKind: WalletList
    plural: wallets
    shortNames:
    - wlt
    singular: wallet
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.address
      name: Address
      type: string
    - jsonPath: .spec.chainId
      name: Chain
      type: integer
    - jsonPath: .spec.purpose
      name: Purpose
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Wallet is a managed EVM wallet record in the ShopHub platform.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WalletSpec is the user-supplied configuration for a Wallet.
            properties:
              address:
                description: |-
                  Address is the EVM wallet address. Stored as the user supplied it
                  (mixed-case checksum form is allowed); the operator does not normalise.
                pattern: ^0x[a-fA-F0-9]{40}$
                type: string
              chainId:
                default: 11155111
                description: |-
                  ChainID is the EVM chain on which Address is valid.
                  Defaults to 11155111 (Sepolia testnet) if unset.
                format: int64
                minimum: 1
                type: integer
              displayName:
                description: DisplayName is the human-readable label shown in the
                  ShopHub UI.
                maxLength: 80
                minLength: 1
                type: string
              ownerRef:
                description: |-
                  OwnerRef optionally identifies the ShopHub user that owns this Wallet.
                  Free-form to avoid coupling to a specific auth model (email, sub, etc.).
                maxLength: 253
                type: string
              purpose:
                default: payments
                description: Purpose declares how this Wallet is used. Defaults to
                  "payments".
                enum:
                - payments
                - payout
                type: string
            required:
            - address
            - displayName
            type: object
          status:
            description: WalletStatus is the reconciler-maintained observed state
              of a Wallet.
            properties:
              conditions:
                description: Conditions follows the standard meta/v1 Condition pattern.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration matches Wallet.metadata.generation when the status
                  was last computed, so clients can detect stale statuses.
                format: int64
                type: integer
              phase:
                description: Phase is the high-level lifecycle position.
                enum:
                - Pending
                - Ready
                - Failed
                - Terminating
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
