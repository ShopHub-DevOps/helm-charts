apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shop.fullname" . }}-backend
  labels:
    {{- include "shop.labels" . | nindent 4 }}
    component: backend
spec:
  replicas: {{ if eq .Values.availabilityTier "high" }}{{ .Values.replicasHigh }}{{ else }}{{ .Values.replicasStandard }}{{ end }}
  selector:
    matchLabels:
      {{- include "shop.selectorLabels" . | nindent 6 }}
      component: backend
  template:
    metadata:
      labels:
        {{- include "shop.selectorLabels" . | nindent 8 }}
        component: backend
    spec:
      containers:
      - name: backend
        image: "{{ .Values.backendImage }}:{{ .Values.backendTag }}"
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: {{ .Values.backendPort }}
          protocol: TCP
        env:
        - name: NODE_ENV
          value: {{ .Values.env.NODE_ENV }}
        - name: LOG_LEVEL
          value: {{ .Values.env.LOG_LEVEL }}
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.databaseSecretName }}
              key: {{ .Values.databaseSecretKey }}
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "shop.fullname" . }}-secrets
              key: jwt-secret
        - name: SHOP_WALLET_ADDRESS
          value: {{ .Values.walletAddress }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
