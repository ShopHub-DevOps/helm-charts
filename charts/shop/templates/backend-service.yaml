apiVersion: v1
kind: Service
metadata:
  name: {{ include "shop.fullname" . }}-backend
  labels:
    {{- include "shop.labels" . | nindent 4 }}
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backendPort }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "shop.selectorLabels" . | nindent 4 }}
    component: backend