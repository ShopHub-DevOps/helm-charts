apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "shophub.fullname" . }}
  labels:
    {{- include "shophub.labels" . | nindent 4 }}
spec:
  rules:
    - host: {{ .Values.ingressHostname }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "shophub.fullname" . }}-backend
                port:
                  number: {{ .Values.backendPort }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "shophub.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontendPort }}
                  